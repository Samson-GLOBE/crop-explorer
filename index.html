<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Origins Explorer | Samson Solomon</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #27ae60; color: white; padding: 1rem 2rem; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 1000; }
        #main-container { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 350px; padding: 20px; overflow-y: auto; background: #fff; border-right: 1px solid #ddd; z-index: 1000; }
        #map { flex: 1; background: #e0eafc; }
        .search-box { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 8px; font-size: 16px; margin-bottom: 20px; box-sizing: border-box; }
        .crop-card { background: #f9f9f9; padding: 20px; border-radius: 12px; border-left: 5px solid #27ae60; display: none; }
        .stats { font-size: 12px; color: #666; margin-bottom: 10px; }
        @media (max-width: 768px) { #main-container { flex-direction: column; } #sidebar { width: 100%; height: auto; } #map { height: 300px; } }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0">Milla et al. Crop Origins Explorer</h2>
</header>

<div id="main-container">
    <div id="sidebar">
        <p id="status" class="stats">Connecting to database...</p>
        <input type="text" id="cropSearch" class="search-box" placeholder="Search by name (e.g. Teff, Coffee)...">
        
        <div id="cropCard" class="crop-card">
            <h2 id="cardName" style="margin-top:0; color: #2c3e50;"></h2>
            <p><strong>🌍 Origin:</strong> <span id="cardOrigin"></span></p>
            <p><strong>⏳ Domestication Age:</strong> <span id="cardAge"></span></p>
            <p><strong>🌿 Classification:</strong> <span id="cardPhylo"></span></p>
            <p><strong>💡 Use:</strong> <span id="cardUse"></span></p>
        </div>
        <div style="margin-top: 20px; font-size: 11px; color: #999;">
            Data pull live from: rubenmilla/Crop_Origins_Phylo
        </div>
    </div>
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script>
    var map = L.map('map').setView([15, 10], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);
    var marker;
    var cropDatabase = [];

    // The live link to Ruben's data
    const csvUrl = 'https://raw.githubusercontent.com/rubenmilla/Crop_Origins_Phylo/master/Crop_Origins_Phylo_v_live/crop_origins_v_live/crop_origins_live_db.csv';

    Papa.parse(csvUrl, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            cropDatabase = results.data;
            document.getElementById('status').innerText = "✅ " + cropDatabase.length + " crops synced from GitHub.";
        }
    });

    function findValue(row, keywords) {
        const key = Object.keys(row).find(k => keywords.some(word => k.toLowerCase().includes(word.toLowerCase())));
        return key ? row[key] : null;
    }

    document.getElementById('cropSearch').addEventListener('input', function(e) {
        const val = e.target.value.toLowerCase().trim();
        if (val.length < 2) return;

        const match = cropDatabase.find(c => 
            Object.values(c).some(v => v && v.toString().toLowerCase().includes(val))
        );

        if (match) {
            const name = findValue(match, ['Common', 'Name', 'Species']) || "Unnamed Crop";
            const origin = findValue(match, ['Region', 'Origin']) || "Not recorded";
            const age = findValue(match, ['Age', 'Antiquity']) || "N/A";
            const family = findValue(match, ['Family']) || "";
            const genus = findValue(match, ['Genus']) || "";
            const lat = parseFloat(findValue(match, ['Lat'])) || 0;
            const lng = parseFloat(findValue(match, ['Lon', 'Lng'])) || 0;

            document.getElementById('cardName').innerText = name;
            document.getElementById('cardOrigin').innerText = origin;
            document.getElementById('cardAge').innerText = age;
            document.getElementById('cardPhylo').innerText = family + " > " + genus;
            document.getElementById('cropCard').style.display = "block";

            if (lat !== 0) {
                if (marker) map.removeLayer(marker);
                marker = L.marker([lat, lng]).addTo(map);
                map.flyTo([lat, lng], 5);
            }
        }
    });
</script>
</body>
</html>
